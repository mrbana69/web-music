<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ReApple Music</title>
    <link rel="icon" href="data:,">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --bg-secondary: #0a0a0c;
            --bg-tertiary: #111114;
            --text-primary: #ffffff;
            --text-secondary: #5a5a62;
            --accent: #fa2d48;
            --accent-dim: rgba(250, 45, 72, 0.12);
            --divider: rgba(255,255,255,0.06);
            --blur-bg: rgba(0, 0, 0, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --safe-area-bottom: env(safe-area-inset-bottom);
            --font-mono: 'Space Mono', monospace;
            --font-display: 'Syne', sans-serif;
            --line: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ── SCAN LINES ── */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
            pointer-events: none; z-index: 9998;
        }

        /* ── GRID OVERLAY ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
            mask-image: radial-gradient(ellipse at 50% 0%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 20%, transparent 70%);
        }

        body {
            font-family: var(--font-mono);
            background: #000000;
            color: var(--text-primary);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Icons --- */
        .icon { width: 24px; height: 24px; fill: currentColor; display: block; }
        .icon-sm { width: 18px; height: 18px; }
        .icon-lg { width: 32px; height: 32px; }
        .icon-xl { width: 44px; height: 44px; }

        /* --- Layout --- */
        .main-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 180px;
            scroll-behavior: smooth;
            position: relative; z-index: 1;
        }

        .container { padding: 0 24px; max-width: 1200px; margin: 0 auto; }

        /* --- Header --- */
        header {
            padding: 32px 24px 16px;
            position: sticky; top: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--divider);
            z-index: 10;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        /* Eyebrow label above section title */
        .header-eyebrow {
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        /* --- Search --- */
        .search-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 11px 14px;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            margin-top: 14px;
            transition: border-color 0.2s ease;
        }
        .search-wrapper:focus-within {
            border-color: rgba(255,255,255,0.18);
        }
        .search-wrapper > svg { margin-right: 10px; color: var(--text-secondary); }
        .search-input {
            background: transparent; border: none;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px; width: 100%; outline: none;
        }
        .search-input::placeholder { color: var(--text-secondary); }

        /* --- Grids & Sections --- */
        .section-title {
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 28px 0 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-text {
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(250,45,72,0.2);
            padding: 5px 12px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-text:hover { background: rgba(250,45,72,0.2); border-color: rgba(250,45,72,0.4); }
        .btn-text:active { transform: scale(0.95); }

        /* --- Card Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px 14px;
        }

        .card { cursor: pointer; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
        .card:active { transform: scale(0.94); }
        .card:hover { transform: scale(1.03); }

        .artwork {
            width: 100%;
            height: 0; padding-bottom: 100%;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
        }
        .artwork img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            font-family: var(--font-display);
            font-size: 13px; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-subtitle {
            font-size: 11px; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* --- List Items --- */
        .list-item {
            display: flex; align-items: center;
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .list-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); }
        .list-item > .list-artwork { margin-right: 14px; }
        .list-item > .list-info { margin-right: 14px; }

        .list-artwork {
            width: 46px; height: 46px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .list-artwork img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex: 1; overflow: hidden; }

        /* --- Tab Bar (Storefront shelf edge) --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 85px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--divider);
            display: flex; justify-content: space-around;
            padding-top: 10px;
            padding-bottom: calc(10px + var(--safe-area-bottom));
            z-index: 100;
        }

        .tab-btn {
            background: none; border: none;
            color: var(--text-secondary);
            display: flex; flex-direction: column; align-items: center;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            width: 64px;
            transition: color 0.2s ease;
        }
        .tab-btn > svg { margin-bottom: 5px; }
        .tab-btn.active { color: var(--accent); }
        .tab-btn:active { transform: scale(0.9); }

        /* --- Mini Player (storefront product tag) --- */
        .mini-player {
            position: fixed;
            bottom: 96px; left: 8px; right: 8px;
            height: 60px;
            background: rgba(12, 12, 14, 0.92);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--divider);
            border-radius: 6px;
            display: flex; align-items: center;
            padding: 0 12px;
            z-index: 90;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateY(160%);
        }
        .mini-player.visible { transform: translateY(0); }
        .mini-player > .mini-art { margin-right: 12px; }
        .mini-player > .mini-info { margin-right: 12px; }

        /* Red accent stripe on mini player */
        .mini-player::before {
            content: '';
            position: absolute;
            left: 0; top: 12px; bottom: 12px;
            width: 2px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        .mini-art {
            width: 40px; height: 40px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            overflow: hidden; flex-shrink: 0;
            border: 1px solid var(--glass-border);
        }
        .mini-art img { width: 100%; height: 100%; object-fit: cover; }

        .mini-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .mini-text {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: var(--font-display);
            font-size: 14px; font-weight: 700;
        }
        .mini-artist {
            color: var(--text-secondary);
            font-size: 10px; letter-spacing: 0.08em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }

        .mini-controls { display: flex; align-items: center; }
        .mini-controls > .control-btn + .control-btn { margin-left: 8px; }

        .control-btn {
            background: none; border: none;
            color: var(--text-primary);
            cursor: pointer; padding: 8px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }
        .control-btn:hover { background: rgba(255,255,255,0.06); }
        .control-btn:active { transform: scale(0.88); }

        /* --- Full Screen Player --- */
        .full-player {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 200;
            display: flex; flex-direction: column;
            padding: 56px 28px 36px;
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
            visibility: hidden;
        }

        /* grid overlay inside full player */
        .full-player::before {
            content: '';
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 80%);
        }

        .full-player.active { transform: translateY(0); visibility: visible; }

        .full-art-container {
            width: 100%; height: 0; padding-bottom: 100%;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            transform: scale(0.88);
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }
        .full-player.active .full-art-container { transform: scale(1); }
        .full-art-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }

        .full-info { margin-bottom: 24px; }
        .full-title {
            font-family: var(--font-display);
            font-size: 22px; font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .full-artist { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.06em; }

        /* Progress */
        .progress-container { margin-bottom: 32px; }
        .progress-bar-bg {
            height: 2px;
            background: rgba(255,255,255,0.12);
            border-radius: 1px;
            position: relative; cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: #ffffff;
            border-radius: 1px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-labels {
            display: flex; justify-content: space-between;
            margin-top: 8px;
            font-size: 10px; color: var(--text-secondary);
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
        }

        /* Main Controls */
        .main-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px;
        }

        .vol-container { display: flex; align-items: center; gap: 12px; }
        .vol-slider {
            flex: 1; -webkit-appearance: none;
            height: 2px; background: rgba(255,255,255,0.15);
            border-radius: 1px; outline: none;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .active-tab-content { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Badge */
        .badge {
            font-size: 9px; padding: 2px 6px;
            border: 1px solid var(--accent); color: var(--accent);
            border-radius: 2px; margin-left: 8px; font-weight: 700;
            letter-spacing: 0.1em;
        }

        /* Player footer views */
        .player-footer {
            display: flex; justify-content: space-around;
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid var(--divider);
        }

        .lyrics-view, .queue-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            padding: 24px 28px;
            overflow-y: auto; z-index: 10;
            display: none; text-align: left;
            background: #000;
            mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
        }
        .lyrics-view.active, .queue-view.active { display: block; }

        .lyrics-line {
            font-family: var(--font-display);
            font-size: 22px; font-weight: 700;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.22);
            transition: all 0.35s ease;
            cursor: pointer;
            line-height: 1.35;
            letter-spacing: -0.01em;
        }
        .lyrics-line.active {
            color: #fff; transform: scale(1.04); transform-origin: left;
        }

        .lyric-word {
            display: inline-block; border-radius: 3px;
            transition: transform 0.1s ease, opacity 0.2s ease, color 0.2s ease;
            opacity: 0.6;
        }
        .lyrics-line.active .lyric-word { opacity: 0.5; }
        .lyrics-line.active .lyric-word.active {
            opacity: 1; color: #fff; transform: scale(1.12);
        }

        .translate-btn {
            position: absolute; top: 16px; right: 16px; z-index: 20;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 5px 10px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
        }

        .like-btn { background: none; border: none; cursor: pointer; }

        .delete-btn {
            padding: 8px; color: var(--text-secondary);
            background: none; border: none; z-index: 5;
            cursor: pointer;
        }
        .delete-btn:hover { color: var(--accent); }

        /* Import Overlay */
        #importOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        #importLog {
            width: 100%; max-width: 400px; height: 300px;
            overflow-y: auto; background: var(--bg-secondary);
            border: 1px solid var(--divider);
            border-radius: 6px; padding: 14px;
            font-family: var(--font-mono); font-size: 11px;
            margin-top: 20px; color: var(--text-secondary);
        }

        /* Responsive Layout */
        .full-player-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative; z-index: 1;
        }

        .player-visual-column {
            position: relative; width: 100%; flex: 1;
            display: flex; align-items: center; justify-content: center;
            min-height: 0; margin-bottom: 24px;
        }

        .player-controls-column { width: 100%; }

        @media (min-width: 768px) {
            .full-player-content {
                flex-direction: row; align-items: center; justify-content: center;
                max-width: 960px; margin: 0 auto;
                gap: 0;
            }
            .full-player-content > .player-visual-column { margin-right: 56px; margin-bottom: 0; }
            .player-visual-column { flex: 1; max-width: 460px; height: auto; padding-bottom: 0; aspect-ratio: 1/1; }
            .player-controls-column { flex: 1; max-width: 380px; }
            .lyrics-view, .queue-view { border-radius: 8px; }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* Full Player staggered reveal */
        .full-player .full-info,
        .full-player .progress-container,
        .full-player .main-controls,
        .full-player .vol-container,
        .full-player .player-footer {
            opacity: 0; transform: translateY(16px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .full-player.active .full-info         { opacity:1; transform:translateY(0); transition-delay:0.10s; }
        .full-player.active .progress-container { opacity:1; transform:translateY(0); transition-delay:0.16s; }
        .full-player.active .main-controls      { opacity:1; transform:translateY(0); transition-delay:0.22s; }
        .full-player.active .vol-container      { opacity:1; transform:translateY(0); transition-delay:0.28s; }
        .full-player.active .player-footer      { opacity:1; transform:translateY(0); transition-delay:0.34s; }

        /* Interactive feedback */
        .card:active, .list-item:active { background-color: rgba(255,255,255,0.04); }

        /* Small screens */
        @media (max-width: 400px) {
            .full-player { padding: 36px 16px 20px; }
            .full-title { font-size: 18px; }
            .full-artist { font-size: 12px; }
            .mini-player { bottom: 88px; left: 4px; right: 4px; height: 54px; }
            .mini-art { width: 36px; height: 36px; }
            .tab-bar { height: 72px; }
            .tab-btn { width: 52px; font-size: 8px; }
        }

        /* ── Update Banner ── */
        #updateBanner {
            background: var(--accent) !important;
            font-family: var(--font-mono);
            font-size: 11px !important;
            letter-spacing: 0.05em;
        }

        /* ── Playlist play button ── */
        .btn-primary {
            padding: 12px 28px;
            background: var(--accent) !important;
            color: white; border: none;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-weight: 700; font-size: 12px;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { opacity: 0.85; transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="tab-home" class="main-container active-tab-content">
        <header>
            <div class="header-actions">
                <div>
                    <div class="header-eyebrow">Now Streaming</div>
                    <h1>Listen Now</h1>
                </div>
                <button class="btn-text" onclick="document.getElementById('csvInput').click()">
                    <svg class="icon-sm" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
            </div>
        </header>
        <div class="container">
            <div class="section-title"><span>Top Picks</span></div>
            <div class="grid" id="recommendations"></div>
        </div>
    </div>

    <div id="tab-search" class="main-container hidden">
        <header>
            <div class="header-eyebrow">Catalogue</div>
            <h1>Search</h1>
            <div class="search-wrapper">
                <svg class="icon-sm" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Artists, Songs, Lyrics">
            </div>
        </header>
        <div class="container" id="searchResults"></div>
    </div>

    <div id="tab-collection" class="main-container hidden">
        <header>
            <div class="header-actions">
                <button class="btn-text" onclick="closeCollection()">
                    <svg class="icon-sm" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <h1 id="collectionTitle">Playlist</h1>

    <audio id="nativeAudio"></audio>

    <script>
        // --- 1. Universal Player using dash.js ---
        class UniversalPlayer {
            constructor() {
                this.videoElement = document.createElement('video');
                this.videoElement.style.display = 'none';
                document.body.appendChild(this.videoElement);
                this.dashPlayer = null;
                this.isPlaying = false;
                this.isInit = false;
            }
            async loadFromDASH(xmlUrl) {
                try {
                    if (typeof dashjs === 'undefined') { console.warn("dash.js not loaded"); return false; }
                    if (this.dashPlayer) { this.dashPlayer.destroy(); this.dashPlayer = null; }
                    this.dashPlayer = dashjs.MediaPlayer().create();
                    this.dashPlayer.updateSettings({ streaming: { buffer: { stableBufferTime: 2, bufferTimeAtTopQuality: 10 }, gaps: { jumpGaps: true }, lowLatencyEnabled: false } });
                    this.dashPlayer.initialize(this.videoElement, xmlUrl, false);
                    return new Promise((resolve) => {
                        const onStreamInitialized = () => { this.isInit = true; this.dashPlayer.off(dashjs.MediaPlayer.events.STREAM_INITIALIZED, onStreamInitialized); resolve(true); };
                        const onError = (event) => { console.error("dash.js error:", event); this.dashPlayer.off(dashjs.MediaPlayer.events.STREAM_INITIALIZED, onStreamInitialized); this.dashPlayer.off(dashjs.MediaPlayer.events.ERROR, onError); resolve(false); };
                        this.dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, onStreamInitialized);
                        this.dashPlayer.on(dashjs.MediaPlayer.events.ERROR, onError);
                    });
                } catch (e) { console.error("Universal player load failed", e); return false; }
            }
            play() { if (this.videoElement) { this.videoElement.play(); this.isPlaying = true; } }
            pause() { if (this.videoElement) { this.videoElement.pause(); this.isPlaying = false; } }
            setVolume(v) { if (this.videoElement) { this.videoElement.volume = v; } }
            seek(time) { if (this.videoElement) { this.videoElement.currentTime = time; } }
            reset() {
                if (this.dashPlayer) { try { this.dashPlayer.destroy(); } catch (e) {} this.dashPlayer = null; }
                if (this.videoElement) { this.videoElement.pause(); this.videoElement.removeAttribute('src'); this.videoElement.currentTime = 0; }
                this.isInit = false;
            }
            get audioElement() { return this.videoElement; }
        }

        // --- 1b. Custom DASH / MSE Player ---
        class DashPlayer {
            constructor() {
                this.mediaSource = null; this.sourceBuffer = null;
                this.audioElement = document.createElement('audio');
                this.queue = []; this.isInit = false; this.isPlaying = false; this.loadId = 0;
            }
            async loadFromXML(xmlString) {
                if (this.mediaSource) { this.reset(); }
                const parser = new DOMParser();
                const doc = parser.parseFromString(xmlString, "text/xml");
                const representation = doc.querySelector('Representation');
                const template = doc.querySelector('SegmentTemplate');
                const timelineNodes = doc.querySelectorAll('SegmentTimeline S');
                const mimeType = doc.querySelector('AdaptationSet').getAttribute('mimeType');
                const codecs = representation.getAttribute('codecs');
                const timescale = parseInt(template.getAttribute('timescale'));
                const initUrl = template.getAttribute('initialization');
                const mediaUrlTemplate = template.getAttribute('media');
                const startNumber = parseInt(template.getAttribute('startNumber') || "1");
                let segments = []; let currentNumber = startNumber; let currentTime = 0;
                timelineNodes.forEach(node => {
                    const d = parseInt(node.getAttribute('d')); const r = parseInt(node.getAttribute('r') || "0");
                    segments.push({ number: currentNumber, duration: d, time: currentTime }); currentNumber++; currentTime += d;
                    for(let i = 0; i < r; i++) { segments.push({ number: currentNumber, duration: d, time: currentTime }); currentNumber++; currentTime += d; }
                });
                this.mediaSource = new MediaSource();
                this.audioElement.src = URL.createObjectURL(this.mediaSource);
                return new Promise((resolve, reject) => {
                    this.mediaSource.addEventListener('sourceopen', async () => {
                        try {
                            const codecString = `${mimeType}; codecs="${codecs}"`;
                            this.sourceBuffer = this.mediaSource.addSourceBuffer(codecString);
                            const initData = await this.fetchSegment(initUrl);
                            this.sourceBuffer.appendBuffer(initData);
                            this.sourceBuffer.addEventListener('updateend', () => {
                                if (!this.isInit) { this.isInit = true; this.loadSegmentsProgressively(segments, mediaUrlTemplate); resolve(); }
                            });
                        } catch(e) { console.error("MSE Error", e); reject(e); }
                    }, { once: true });
                });
            }
            async fetchSegment(url) { const response = await fetch(url); return await response.arrayBuffer(); }
            async loadSegmentsProgressively(segments, urlTemplate) {
                const currentId = this.loadId;
                for (const seg of segments) {
                    if (this.loadId !== currentId) break;
                    if (!this.mediaSource || this.mediaSource.readyState === 'closed') break;
                    const url = urlTemplate.replace('$Number$', seg.number);
                    try {
                        const data = await this.fetchSegment(url);
                        if (this.loadId !== currentId) break;
                        let appended = false;
                        while (!appended) {
                            if (this.loadId !== currentId) break;
                            while(this.sourceBuffer && this.sourceBuffer.updating) { await new Promise(r => setTimeout(r, 50)); }
                            if (this.loadId !== currentId) break;
                            try { this.sourceBuffer.appendBuffer(data); appended = true; }
                            catch (err) {
                                if (err.name === 'QuotaExceededError') {
                                    const ct = this.audioElement.currentTime;
                                    if (ct > 10) { if (!this.sourceBuffer.updating) { this.sourceBuffer.remove(0, ct - 10); } }
                                    else { await new Promise(r => setTimeout(r, 1000)); }
                                } else { throw err; }
                            }
                        }
                    } catch (e) { console.error("Segment load failed", e); if (e.name === 'QuotaExceededError') break; }
                }
                while(this.sourceBuffer && this.sourceBuffer.updating) { await new Promise(r => setTimeout(r, 50)); }
                if (this.loadId === currentId && this.mediaSource && this.mediaSource.readyState === 'open') { this.mediaSource.endOfStream(); }
            }
            play() { this.audioElement.play(); this.isPlaying = true; }
            pause() { this.audioElement.pause(); this.isPlaying = false; }
            setVolume(v) { this.audioElement.volume = v; }
            seek(time) { this.audioElement.currentTime = time; }
            reset() {
                this.loadId++;
                if (this.audioElement) {
                    this.audioElement.pause();
                    if (this.mediaSource && this.sourceBuffer) {
                        try { if (this.sourceBuffer.updating) this.sourceBuffer.abort(); if (this.mediaSource.readyState === 'open') { this.mediaSource.removeSourceBuffer(this.sourceBuffer); } } catch (e) {}
                    }
                    this.audioElement.removeAttribute('src'); this.audioElement.load();
                }
                this.isInit = false; this.mediaSource = null; this.sourceBuffer = null;
            }
        }

        // --- 2. App State & Logic ---
        const API_URL = 'https://triton.squid.wtf';
        const universalPlayer = new UniversalPlayer();
        const dashPlayer = new DashPlayer();
        const nativeAudio = document.getElementById('nativeAudio');

        universalPlayer.audioElement.addEventListener('ended', () => nextTrack());
        dashPlayer.audioElement.addEventListener('ended', () => nextTrack());
        nativeAudio.addEventListener('ended', () => nextTrack());

        let state = {
            queue: [], currentIndex: 0, isPlaying: false, isHiRes: false, volume: 1,
            shuffle: false, repeat: false, lyrics: null, syncedLyrics: [], showTranslation: false,
            likedSongs: JSON.parse(localStorage.getItem('likedSongs') || '[]'),
            playlists: JSON.parse(localStorage.getItem('playlists') || '[]'),
            currentPlaylistIndex: -1, mixLoaded: false
        };

        // --- 3. UI Interactions ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            ['home', 'search', 'library', 'collection'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('active-tab-content');
            });
            const active = document.getElementById('tab-' + tabName);
            active.classList.remove('hidden');
            active.classList.add('active-tab-content');
            if (tabName === 'home') loadRecommendations();
            if (tabName === 'library') renderPlaylists();
        }

        function openFullPlayer() { document.getElementById('fullPlayer').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('active'); }

        let touchStartY = 0, touchEndY = 0;
        const fullPlayer = document.getElementById('fullPlayer');
        fullPlayer.addEventListener('touchstart', (e) => { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
        fullPlayer.addEventListener('touchend', (e) => { touchEndY = e.changedTouches[0].screenY; if (touchEndY - touchStartY > 100) { closeFullPlayer(); } }, { passive: true });

        // --- 4. Audio Control ---
        async function clearCacheAndUpdate() {
            if ('serviceWorker' in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    if (registrations.length) { for (const r of registrations) { await r.unregister(); } }
                    const keys = await caches.keys();
                    await Promise.all(keys.map(key => caches.delete(key)));
                    alert('Cache cleared! Reloading...'); window.location.reload(true);
                } catch (error) { console.error('Failed to clear cache:', error); alert('Error clearing cache. Try manually.'); }
            } else { alert('Service workers not supported.'); }
        }

        async function loadMix(track, fromSearch = false) {
            try {
                if (state.mixLoaded) return;
                const infoRes = await fetch(`${API_URL}/info/?id=${track.id}`);
                const infoData = await infoRes.json();
                if (infoData.data && infoData.data.mixes && infoData.data.mixes.TRACK_MIX) {
                    const mixId = infoData.data.mixes.TRACK_MIX;
                    const mixRes = await fetch(`${API_URL}/mix/?id=${mixId}`);
                    const mixData = await mixRes.json();
                    const items = mixData.items || (mixData.data && mixData.data.items);
                    if (items) {
                        const newTracks = items.filter(t => t.id !== track.id).map(t => { if (t.artists && !t.artist) { t.artist = t.artists[0]; } return t; });
                        if (newTracks.length > 0) { state.queue.push(...newTracks); updateQueueUI(); state.mixLoaded = true; }
                    }
                } else if (fromSearch) {
                    try {
                        const query = encodeURIComponent(track.title + ' ' + (track.artist?.name || ''));
                        const searchRes = await fetch(`${API_URL}/search/?s=${query}`);
                        const searchData = await searchRes.json();
                        if (searchData.data && searchData.data.items) {
                            const currentIndex = searchData.data.items.findIndex(t => t.id === track.id);
                            if (currentIndex !== -1 && currentIndex < searchData.data.items.length - 1) {
                                const nextSongs = searchData.data.items.slice(currentIndex + 1, currentIndex + 6);
                                if (nextSongs.length > 0) { state.queue.push(...nextSongs); updateQueueUI(); state.mixLoaded = true; }
                            }
                        }
                    } catch (e) { console.error("Search-based mix failed", e); }
                }
            } catch (e) { console.error("Mix load failed", e); }
        }

        async function playTrack(track, fromQueue = false, fromSearch = false, playlistIndex = -1) {
            addToHistory(track);
            state.mixLoaded = false;
            if (!fromQueue) {
                state.queue = [track]; state.currentIndex = 0; state.currentPlaylistIndex = playlistIndex;
                if (typeof loadMix === 'function') loadMix(track, fromSearch).catch(e => console.error(e));
            }
            const currentTrack = state.queue[state.currentIndex];
            updatePlayerUI(currentTrack); fetchLyrics(currentTrack); updateMediaSession(currentTrack);
            document.getElementById('miniPlayer').classList.add('visible');
            nativeAudio.pause(); universalPlayer.reset(); dashPlayer.reset();
            try {
                const manifestRes = await fetch(`${API_URL}/track/?id=${currentTrack.id}&quality=LOSSLESS`);
                if (!manifestRes.ok) throw new Error(`Manifest fetch failed: ${manifestRes.status}`);
                const manifestData = await manifestRes.json();
                if (!manifestData.data || !manifestData.data.manifest) throw new Error("Initial manifest format incorrect.");
                const streamManifestStr = atob(manifestData.data.manifest);
                const streamManifest = JSON.parse(streamManifestStr);
                if (!streamManifest.urls || streamManifest.urls.length === 0) throw new Error("No stream URL found.");
                const streamUrl = streamManifest.urls[0];
                nativeAudio.src = streamUrl;
                await nativeAudio.play();
                state.isPlaying = true; updatePlayIcons();
            } catch (e) {
                console.error("Playback failed:", e);
                alert(`Playback failed: ${e.message}`);
                state.isPlaying = false; updatePlayIcons();
            }
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            if (universalPlayer.isInit) { state.isPlaying ? universalPlayer.play() : universalPlayer.pause(); }
            else if (state.isHiRes && dashPlayer.isInit) { state.isPlaying ? dashPlayer.play() : dashPlayer.pause(); }

        function parseLRC(lrc) {
    const lines = lrc.split('\n');
    const result = [];
    const regex = /^\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;

    for (const line of lines) {
        const match = line.match(regex);
        if (match) {
            const min = parseInt(match[1]);
            const sec = parseInt(match[2]);
            const ms = parseInt(match[3]);
            const time = min * 60 + sec + (ms / 1000);
            const text = match[4].trim();
            if (text) result.push({ time, text });
        }
    }
    return result;
}

        function updateLyricsScroll(time) {
            if (!state.syncedLyrics.length || !document.getElementById('lyricsView').classList.contains('active')) return;
            const lines = state.syncedLyrics; let activeIndex = -1;
            for (let i = 0; i < lines.length; i++) { if (time >= lines[i].time) { activeIndex = i; } else { break; } }
            const divs = document.querySelectorAll('.lyrics-line');
            divs.forEach(d => d.classList.remove('active'));
            if (activeIndex !== -1 && divs[activeIndex]) {
                const activeLine = divs[activeIndex]; activeLine.classList.add('active');
                const words = activeLine.querySelectorAll('.lyric-word');
                if (words.length > 0) {
                    let activeWord = null;
                    words.forEach(w => { w.classList.remove('active'); if (time >= parseFloat(w.dataset.time)) activeWord = w; });
                    if (activeWord) activeWord.classList.add('active');
                }
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // --- CSV Import ---
        function levenshtein(a, b) {
            if (a.length === 0) return b.length; if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i-1) === a.charAt(j-1)) { matrix[i][j] = matrix[i-1][j-1]; }
                    else { matrix[i][j] = Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1); }
                }
            }
            return matrix[b.length][a.length];
        }

        function parseCSVLine(line) {
            const parts = []; let current = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (char === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
                else { current += char; }
            }
            parts.push(current.trim()); return parts;
        }

        function parseSpotifyCSV(text) {
            const lines = text.split('\n').filter(l => l.trim());
            let headerIndex = -1; const headers = {};
            for (let i = 0; i < Math.min(lines.length, 20); i++) {
                const row = parseCSVLine(lines[i]);
                if (row.includes('Track Name') && row.includes('Artist Name(s)')) { headerIndex = i; row.forEach((h, idx) => headers[h] = idx); break; }
            }
            if (headerIndex === -1) return null;
            const results = [];
            for (let i = headerIndex + 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length < 2) continue;
                results.push({ title: row[headers['Track Name']] || '', artist: row[headers['Artist Name(s)']] || '', album: row[headers['Album Name']] || '' });
            }
            return results;
        }

        let importState = { tracks: [], currentIndex: 0, foundTracks: [] };

        function handleCSVImport(input) {
            const file = input.files[0]; if (!file) return;
            let overlay = document.getElementById('importOverlay');
            if (!overlay) {
                overlay = document.createElement('div'); overlay.id = 'importOverlay';
                overlay.innerHTML = `<h2 style="margin-bottom:10px;font-family:var(--font-display);font-size:20px;">Import Playlist</h2><div id="importLog"></div><button class="btn-text" id="nextBtn" style="margin-top:20px;display:none;" onclick="processNextTrack()">Start Import</button><button class="btn-text" style="margin-top:12px;background:transparent;border-color:var(--divider);color:var(--text-secondary);" onclick="this.parentElement.remove()">Close</button>`;
                document.body.appendChild(overlay);
            } else { document.body.appendChild(overlay); }
            const log = document.getElementById('importLog');
            log.innerHTML = '';
            const logMsg = (msg) => { const div = document.createElement('div'); div.textContent = `> ${msg}`; div.style.cssText = 'margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #222;'; log.appendChild(div); log.scrollTop = log.scrollHeight; };
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const parsedRows = parseSpotifyCSV(text);
                if (!parsedRows || parsedRows.length === 0) { logMsg("❌ Error: could not find headers."); alert("Invalid CSV format. Use a Spotify export."); input.value = ''; return; }
                importState.tracks = parsedRows; importState.currentIndex = 0; importState.foundTracks = [];
                logMsg(`Parsed ${parsedRows.length} tracks.`); logMsg("Click 'Start Import' to begin.");
                const trackList = parsedRows.map((row, i) => `<div id="track-${i}" style="padding:2px 0;">${i+1}. ${row.title} — ${row.artist}</div>`).join('');
                log.innerHTML += `<div style="margin-top:12px;">${trackList}</div>`;
                document.getElementById('nextBtn').style.display = 'block';
            };
            reader.readAsText(file);
        }

        async function processNextTrack() {
            const nextBtn = document.getElementById('nextBtn'); nextBtn.disabled = true; nextBtn.textContent = 'Importing...';
            for (let i = importState.currentIndex; i < importState.tracks.length; i++) {
                const row = importState.tracks[i]; const log = document.getElementById('importLog');
                const logMsg = (msg) => { const div = document.createElement('div'); div.textContent = `> ${msg}`; div.style.cssText = 'margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #222;'; log.appendChild(div); log.scrollTop = log.scrollHeight; };
                const trackDiv = document.getElementById(`track-${i}`); trackDiv.style.color = '#fa2d48';
                let query = `${row.title} ${row.artist}`;
                try {
                    logMsg(`Searching: "${query}"...`);
                    const res = await fetch(`${API_URL}/search/?s=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data.data && data.data.items && data.data.items.length > 0) {
                        const bestMatch = data.data.items.find(track => {
                            const tTitle = track.title.toLowerCase(); const tArtist = (track.artist?.name || '').toLowerCase();
                            const expTitle = row.title.toLowerCase(); const expArtist = row.artist.toLowerCase();
                            const titleMatch = tTitle.includes(expTitle) || expTitle.includes(tTitle) || levenshtein(tTitle, expTitle) <= 2;
                            const artistMatch = tArtist.includes(expArtist) || expArtist.includes(tArtist) || levenshtein(tArtist, expArtist) <= 2;
                            return titleMatch && artistMatch;
                        });
                        if (bestMatch) { importState.foundTracks.push(bestMatch); trackDiv.style.color = '#32d74b'; logMsg(`✔ Added: ${bestMatch.title}`); }
                        else { trackDiv.style.color = '#5a5a62'; logMsg(`❌ No match: ${row.title}`); }
                    } else { trackDiv.style.color = '#5a5a62'; logMsg(`❌ No results: ${row.title}`); }
                } catch (err) { console.error("Import error", err); trackDiv.style.color = '#5a5a62'; logMsg(`❌ Error: ${err.message}`); }
                importState.currentIndex = i + 1;
                await new Promise(r => setTimeout(r, 100));
            }
            state.playlists.push({ name: 'Imported Playlist', songs: importState.foundTracks });
            localStorage.setItem('playlists', JSON.stringify(state.playlists));
            renderPlaylists();
            alert(`Import complete. ${importState.foundTracks.length} songs added.`);
            document.getElementById('importOverlay').remove();
        }

        function renderPlaylists() {
            const container = document.getElementById('playlistsList');

            container.innerHTML = state.playlists.map((pl, index) => `

                    </div>
                    <div class="list-info">
                        <div class="card-title">${pl.name}</div>
                        <div class="card-subtitle">${pl.songs.length} songs</div>
                    </div>
                    <button class="delete-btn" onclick="deletePlaylist(event, ${index})">
                        <svg class="icon-sm" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>`).join('');
        }

        function deletePlaylist(event, index) {
            event.stopPropagation();
            if(confirm('Delete this playlist?')) { state.playlists.splice(index, 1); localStorage.setItem('playlists', JSON.stringify(state.playlists)); renderPlaylists(); }
        }

        // --- 9. Collection & Like ---
        function toggleLike() {
            const track = state.queue[state.currentIndex]; if (!track) return;
            const index = state.likedSongs.findIndex(t => t.id === track.id);
            if (index > -1) { state.likedSongs.splice(index, 1); } else { state.likedSongs.unshift(track); }
            localStorage.setItem('likedSongs', JSON.stringify(state.likedSongs));
            updateLikeIcon();
        }

        function updateLikeIcon() {
            const track = state.queue[state.currentIndex];
            const btn = document.querySelector('#likeBtn svg'); const path = btn.querySelector('path');
            if (track && state.likedSongs.some(t => t.id === track.id)) {
                btn.style.color = 'var(--accent)';
                path.setAttribute('d', "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");
            } else {
                btn.style.color = 'var(--text-secondary)';
                path.setAttribute('d', "M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z");
            }
        }

        function openLikedSongs() { openCollection('Liked Songs', state.likedSongs); }
        function openPlaylist(index) { const pl = state.playlists[index]; openPlaylistPage(pl.name, pl.songs, index); }

        function openPlaylistPage(title, songs, playlistIndex) {
            document.getElementById('tab-library').classList.add('hidden');
            document.getElementById('tab-collection').classList.add('hidden');
            document.getElementById('tab-playlist-page').classList.remove('hidden');
            document.getElementById('playlistPageTitle').textContent = title;
            document.getElementById('playlistPageCount').textContent = `${songs.length} songs`;
            const coverArt = songs.length > 0 && songs[0].album?.cover ? `https://resources.tidal.com/images/${songs[0].album.cover.replace(/-/g,'/')}/640x640.jpg` : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23111"/></svg>';
            document.getElementById('playlistPageCover').src = coverArt;
            const playBtn = document.getElementById('playlistPlayBtn');
            playBtn.onclick = () => { if (songs.length > 0) { state.queue = [...songs]; state.currentIndex = 0; state.currentPlaylistIndex = playlistIndex; playTrack(songs[0], true, false, playlistIndex); openFullPlayer(); } };
            const container = document.getElementById('playlistSongsList');
            container.innerHTML = '';
            if (songs.length === 0) { container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;margin-top:40px;font-size:12px;letter-spacing:0.1em;">No songs in this playlist.</p>'; return; }
            container.innerHTML = songs.map((track, i) => {
                const trackStr = JSON.stringify(track).replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                const artUrl = track.album?.cover ? `https://resources.tidal.com/images/${track.album.cover.replace(/-/g,'/')}/320x320.jpg` : '';
                return `<div class="list-item animate-in" style="animation-delay:${i*50}ms" onclick='handlePlaylistSongClick(${trackStr}, ${playlistIndex})'><div class="list-artwork"><img src="${artUrl}"></div><div class="list-info"><div class="card-title">${track.title}</div><div class="card-subtitle">${track.artist?.name}</div></div></div>`;
            }).join('');
        }

        function handlePlaylistSongClick(track, playlistIndex) {
            const pl = state.playlists[playlistIndex];
            const songIndex = pl.songs.findIndex(t => t.id === track.id);
            state.queue = [...pl.songs]; state.currentIndex = songIndex >= 0 ? songIndex : 0;
            state.currentPlaylistIndex = playlistIndex;
            playTrack(state.queue[state.currentIndex], true, false, playlistIndex);
        }

        function closePlaylistPage() { document.getElementById('tab-playlist-page').classList.add('hidden'); document.getElementById('tab-library').classList.remove('hidden'); }

        function openCollection(title, songs) {
            document.getElementById('tab-library').classList.add('hidden');
            document.getElementById('tab-collection').classList.remove('hidden');
            document.getElementById('collectionTitle').textContent = title;
            const container = document.getElementById('collectionList');
            container.innerHTML = '';
            if (songs.length === 0) { container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;margin-top:40px;font-size:12px;letter-spacing:0.1em;">No songs yet.</p>'; return; }
            container.innerHTML = songs.map((track, i) => {
                const trackStr = JSON.stringify(track).replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                const artUrl = track.album?.cover ? `https://resources.tidal.com/images/${track.album.cover.replace(/-/g,'/')}/320x320.jpg` : '';
                return `<div class="list-item animate-in" style="animation-delay:${i*50}ms" onclick='playTrack(${trackStr})'><div class="list-artwork"><img src="${artUrl}"></div><div class="list-info"><div class="card-title">${track.title}</div><div class="card-subtitle">${track.artist?.name}</div></div></div>`;
            }).join('');
        }

        function closeCollection() { document.getElementById('tab-collection').classList.add('hidden'); document.getElementById('tab-library').classList.remove('hidden'); }

        loadRecommendations();
        renderPlaylists();

        // --- PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered:', reg)).catch(err => console.log('SW failed:', err));
            });
        }

        if (navigator.storage && navigator.storage.persist) { navigator.storage.persist().then(g => console.log("Persistent storage:", g)); }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', (event) => { if (event.data && event.data.type === 'UPDATE_AVAILABLE') { showUpdateBanner(); } });
        }

        function showUpdateBanner() {
            const existing = document.getElementById('updateBanner'); if (existing) existing.remove();
            const banner = document.createElement('div'); banner.id = 'updateBanner';
            banner.style.cssText = `position:fixed;top:0;left:0;right:0;background:var(--accent);color:white;padding:10px 20px;text-align:center;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,0.5);animation:slideDown 0.3s ease;`;
            banner.innerHTML = `<span>New version available.</span><button onclick="location.reload()" style="margin-left:16px;background:rgba(255,255,255,0.15);border:none;color:white;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;">RELOAD</button><button onclick="this.parentElement.remove()" style="margin-left:10px;background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;">×</button>`;
            document.body.appendChild(banner);
        }
    </script>
</body>
</html>
